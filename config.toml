[theme]
base = "light"
primaryColor = "#2563eb"
backgroundColor = "#f1f5f9"
secondaryBackgroundColor = "#ffffff"
textColor = "#1e293b"
font = "sans serif"

# Newer Streamlit versions (1.40+) support a dedicated sidebar theme block.
# This gives the dark sidebar correct, guaranteed-readable text on its own,
# independent of the CSS injected in app.py.
[theme.sidebar]
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#e2e8f0"
